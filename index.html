<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Feedback UI - Compact & Multi-theme</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --bg-body: fixed linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --bg-card: rgba(255, 255, 255, 0.8);
            --text-main: #0f172a;
            --text-sub: #64748b;
            --border: rgba(255, 255, 255, 0.6);
            --input-bg: rgba(255, 255, 255, 0.5);
            --accent: #fbbf24;
        }

        .dark {
            --bg-body: fixed linear-gradient(135deg, #0f172a 0%, #020617 100%);
            --bg-card: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
            --input-bg: rgba(15, 23, 42, 0.6);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-body);
            transition: background 0.5s ease;
            min-height: 100vh;
        }

        .main-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            transition: all 0.4s ease;
        }

        .star-btn {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: #94a3b8;
        }

        .star-btn.active {
            color: var(--accent);
            filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.5));
            transform: scale(1.2);
        }

        .category-chip {
            transition: all 0.2s ease;
            background: var(--input-bg);
            color: var(--text-sub);
            border: 1px solid var(--border);
        }

        .category-chip.active {
            background: var(--text-main);
            color: var(--bg-card);
            border-color: var(--text-main);
        }

        .theme-toggle {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 50;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center p-6">

    <!-- Theme Switcher -->
    <button onclick="toggleTheme()" class="theme-toggle p-3 rounded-full bg-white/20 backdrop-blur-md border border-white/30 text-slate-800 dark:text-white shadow-lg active:scale-90 transition-all">
        <svg id="theme-icon-sun" class="w-5 h-5 hidden dark:block" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>
        <svg id="theme-icon-moon" class="w-5 h-5 block dark:hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path></svg>
    </button>

    <div class="main-card w-full max-w-sm rounded-[2.5rem] overflow-hidden animate-fade-in">
        
        <!-- Auth Section -->
        <div id="auth-section" class="px-8 py-12 text-center">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-white dark:bg-slate-800 rounded-3xl shadow-xl mb-6 border border-slate-100 dark:border-slate-700">
                <svg class="w-8 h-8 text-slate-800 dark:text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                </svg>
            </div>
            <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white mb-2">Bantu kami berkembang!</h2>
            <p class="text-slate-500 dark:text-slate-400 text-sm mb-8">Masuk untuk memberikan saran atau melaporkan bug.</p>

            <button id="google-btn" onclick="window.loginGoogle()" class="w-full flex items-center justify-center gap-3 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 py-4 rounded-2xl font-bold text-slate-700 dark:text-white hover:border-slate-900 dark:hover:border-amber-400 transition-all active:scale-[0.98]">
                <svg class="w-5 h-5" viewBox="0 0 24 24">
                    <path fill="#EA4335" d="M12 5.04c1.94 0 3.51.68 4.7 1.81l3.51-3.51C17.91 1.25 15.21 0 12 0 7.31 0 3.25 2.67 1.19 6.6l3.99 3.1c1-2.92 3.73-5.06 6.82-5.06z"/>
                    <path fill="#4285F4" d="M23.49 12.27c0-.79-.07-1.54-.19-2.27H12v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58l3.86 3c2.26-2.09 3.56-5.17 3.56-8.82z"/>
                    <path fill="#FBBC05" d="M5.18 14.51c-.25-.74-.4-1.52-.4-2.33s.15-1.59.4-2.33L1.19 6.6C.43 8.15 0 9.88 0 11.71s.43 3.56 1.19 5.11l3.99-3.1z"/>
                    <path fill="#34A853" d="M12 24c3.24 0 5.97-1.09 7.96-2.94l-3.86-3c-1.1.74-2.51 1.17-4.1 1.17-3.09 0-5.82-2.14-6.82-5.06l-3.99 3.1C3.25 21.33 7.31 24 12 24z"/>
                </svg>
                <span>Google Login</span>
            </button>
        </div>

        <!-- Feedback Section -->
        <div id="feedback-section" class="hidden">
            <div class="px-6 pt-6 flex justify-between items-center">
                <div class="flex items-center gap-2 bg-white/40 dark:bg-slate-800/40 p-1 pr-3 rounded-full border border-white/20">
                    <img id="user-avatar" class="w-8 h-8 rounded-full border border-white" src="" />
                    <span id="user-name" class="text-[10px] font-bold text-slate-800 dark:text-white truncate max-w-[80px]">User</span>
                </div>
                <button onclick="window.logout()" class="text-slate-400 hover:text-red-500 transition-colors">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7"></path></svg>
                </button>
            </div>

            <div class="px-8 pt-6 pb-2 text-center">
                <h2 class="text-xl font-extrabold text-slate-900 dark:text-white">Ada Masukan?</h2>
            </div>

            <div id="modal-content" class="px-8 pb-10">
                <div id="step-1" class="space-y-6">
                    <!-- Star Rating -->
                    <div class="flex justify-center gap-1" id="star-container"></div>
                    <p id="rating-label" class="text-center text-[10px] font-bold uppercase tracking-widest text-slate-400">Pilih Bintang</p>

                    <!-- Category -->
                    <div class="flex justify-center gap-2">
                        <button onclick="window.setCategory(this)" class="category-chip px-4 py-2 rounded-xl text-[9px] font-bold">BUG</button>
                        <button onclick="window.setCategory(this)" class="category-chip px-4 py-2 rounded-xl text-[9px] font-bold">SARAN</button>
                        <button onclick="window.setCategory(this)" class="category-chip px-4 py-2 rounded-xl text-[9px] font-bold">LAINNYA</button>
                    </div>

                    <div class="relative">
                        <textarea id="feedback-text" rows="3" maxlength="300" 
                            class="w-full bg-var-input-bg border border-slate-200 dark:border-slate-700 dark:bg-slate-800/50 dark:text-white rounded-2xl p-4 text-xs outline-none focus:border-slate-900 dark:focus:border-amber-400 transition-all resize-none shadow-inner" 
                            placeholder="Ceritakan kendala Anda..."></textarea>
                        <div class="absolute bottom-3 right-4 text-[9px] font-bold text-slate-300">
                            <span id="char-count">0</span>/300
                        </div>
                    </div>

                    <button id="submit-btn" onclick="window.submitFeedback()" disabled 
                        class="w-full bg-slate-900 dark:bg-amber-400 dark:text-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg text-[10px] uppercase tracking-widest disabled:opacity-20 active:scale-95 transition-all">
                        Kirim Feedback
                    </button>
                </div>

                <!-- Success State -->
                <div id="step-2" class="hidden text-center py-6 space-y-4 animate-fade-in">
                    <div class="w-16 h-16 bg-emerald-500 rounded-2xl mx-auto flex items-center justify-center text-white shadow-lg">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                    </div>
                    <h3 class="text-lg font-bold text-slate-900 dark:text-white">Terkirim! 🚀</h3>
                    <p class="text-slate-500 dark:text-slate-400 text-[11px]">Terima kasih atas dukungannya.</p>
                    <button onclick="window.resetForm()" class="text-[10px] font-bold text-slate-400 hover:text-slate-900 dark:hover:text-white uppercase tracking-widest transition-colors">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase & Logic -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqzcvKcqAmRmHqUS6fumlyGgxPO8O2c3Y",
            authDomain: "zea-team.firebaseapp.com",
            projectId: "zea-team",
            storageBucket: "zea-team.firebasestorage.app",
            messagingSenderId: "122346941502",
            appId: "1:122346941502:web:9986957727b3086dd2756f",
            measurementId: "G-Q7P6GNXED7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.loginGoogle = async () => {
            const btn = document.getElementById('google-btn');
            btn.innerHTML = '<div class="spinner"></div>';
            try { await signInWithPopup(auth, provider); } 
            catch (e) { alert("Login gagal."); btn.innerHTML = '<span>Google Login</span>'; }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            document.getElementById('auth-section').classList.toggle('hidden', !!user);
            document.getElementById('feedback-section').classList.toggle('hidden', !user);
            if (user) {
                document.getElementById('user-name').innerText = user.displayName;
                document.getElementById('user-avatar').src = user.photoURL;
                window.currentUser = user;
            }
        });
    </script>

    <script>
        // Theme Toggle Logic
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');

        let currentRating = 0;
        let currentCategory = 'Umum';

        // Stars
        const container = document.getElementById('star-container');
        for(let i=1; i<=5; i++) {
            container.innerHTML += `
                <button onclick="window.setRating(${i})" class="star-btn">
                    <svg class="w-8 h-8 fill-current" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                </button>`;
        }

        window.setRating = (val) => {
            currentRating = val;
            document.querySelectorAll('.star-btn').forEach((s, i) => s.classList.toggle('active', i < val));
            document.getElementById('submit-btn').disabled = false;
        };

        window.setCategory = (el) => {
            document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentCategory = el.innerText;
        };

        document.getElementById('feedback-text').addEventListener('input', (e) => {
            document.getElementById('char-count').innerText = e.target.value.length;
        });

        window.resetForm = () => {
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('feedback-text').value = '';
            document.querySelectorAll('.star-btn').forEach(s => s.classList.remove('active'));
            currentRating = 0;
            document.getElementById('submit-btn').disabled = true;
        };

        window.submitFeedback = async () => {
            const user = window.currentUser;
            const btn = document.getElementById('submit-btn');
            const messageText = document.getElementById('feedback-text').value || "Tidak ada pesan.";
            btn.innerHTML = '<div class="spinner mx-auto"></div>';
            
            // Membuat visualisasi bintang
            const starStr = "⭐".repeat(currentRating) + "🌑".repeat(5 - currentRating);

            const payload = {
                content: "🚀 **Feedback Baru Diterima!**",
                embeds: [{
                    title: "Rincian Masukan",
                    color: 0xFBBF24, // Warna Amber
                    fields: [
                        { name: "👤 Nama Pengguna", value: user.displayName, inline: true },
                        { name: "📧 Email", value: user.email || "Email Tersembunyi", inline: true },
                        { name: "🌟 Rating", value: `${starStr} (${currentRating}/5)`, inline: false },
                        { name: "🏷️ Kategori", value: `\`${currentCategory}\``, inline: true },
                        { name: "📅 Waktu", value: new Date().toLocaleString('id-ID'), inline: true },
                        { name: "💬 Pesan", value: `\`\`\`${messageText}\`\`\``, inline: false }
                    ],
                    thumbnail: { url: user.photoURL },
                    footer: { text: "Sistem Feedback Otomatis" },
                    timestamp: new Date().toISOString()
                }]
            };

            try {
                const response = await fetch('https://discord.com/api/webhooks/1487071889892311112/z4IuG7uHgD_FDDV6vIcv8Vsf6807ySoJrIALS7UEYYKY7hmve--jAoaFwSBhF3s8npGQ', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-2').classList.remove('hidden');
                } else {
                    throw new Error("Gagal mengirim ke Discord");
                }
            } catch (e) {
                alert("Gagal mengirim feedback. Silakan periksa koneksi Anda.");
            } finally {
                btn.innerText = "Kirim Feedback";
            }
        };
    </script>
</body>
</html>
