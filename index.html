<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Feedback UI - Ultra Modern</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        :root {
            --primary: #0f172a;
            --accent: #fbbf24;
            --glass: rgba(255, 255, 255, 0.75);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: fixed linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            position: relative;
            overflow: hidden;
            min-height: 100vh;
        }

        /* Latar belakang dekoratif */
        body::before {
            content: "";
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.15) 0%, rgba(251, 191, 36, 0) 70%);
            top: -100px;
            right: -100px;
            z-index: -1;
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(24px) saturate(200%);
            -webkit-backdrop-filter: blur(24px) saturate(200%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 40px 80px -20px rgba(0, 0, 0, 0.12);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .star-btn {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            color: #cbd5e1;
        }

        .star-btn:hover {
            transform: scale(1.2) rotate(8deg);
            color: #94a3b8;
        }

        .star-btn.active {
            color: var(--accent);
            filter: drop-shadow(0 0 12px rgba(251, 191, 36, 0.6));
            transform: scale(1.25);
        }

        .category-chip {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
        }

        .category-chip:hover {
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }

        .category-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 12px 20px -5px rgba(15, 23, 42, 0.3);
            transform: translateY(-3px);
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .animate-slide-up {
            animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .spinner {
            width: 22px;
            height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .input-focus-effect:focus {
            box-shadow: 0 0 0 4px rgba(15, 23, 42, 0.05);
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="main-card w-full max-w-md rounded-[3.5rem] overflow-hidden animate-slide-up">
        
        <!-- Auth Section -->
        <div id="auth-section" class="px-12 py-20">
            <div class="text-center mb-12">
                <div class="inline-flex items-center justify-center w-24 h-24 bg-white rounded-[2.5rem] shadow-2xl mb-8 transform -rotate-6 border border-slate-50">
                    <svg class="w-12 h-12 text-slate-800" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                    </svg>
                </div>
                <h2 class="text-4xl font-extrabold text-slate-900 tracking-tight mb-4">Hai! 👋</h2>
                <p class="text-slate-500 text-base font-medium leading-relaxed">Punya saran atau menemukan kendala? Beritahu kami lewat feedback.</p>
            </div>

            <div class="space-y-6">
                <button id="google-btn" onclick="window.loginGoogle()" class="w-full group flex items-center justify-between bg-white border border-slate-200 pl-6 pr-4 py-5 rounded-[2.2rem] font-bold text-slate-700 hover:border-slate-900 transition-all shadow-sm active:scale-[0.97]">
                    <div class="flex items-center gap-4">
                        <svg class="w-6 h-6" viewBox="0 0 24 24">
                            <path fill="#EA4335" d="M12 5.04c1.94 0 3.51.68 4.7 1.81l3.51-3.51C17.91 1.25 15.21 0 12 0 7.31 0 3.25 2.67 1.19 6.6l3.99 3.1c1-2.92 3.73-5.06 6.82-5.06z"/>
                            <path fill="#4285F4" d="M23.49 12.27c0-.79-.07-1.54-.19-2.27H12v4.51h6.47c-.29 1.48-1.14 2.73-2.4 3.58l3.86 3c2.26-2.09 3.56-5.17 3.56-8.82z"/>
                            <path fill="#FBBC05" d="M5.18 14.51c-.25-.74-.4-1.52-.4-2.33s.15-1.59.4-2.33L1.19 6.6C.43 8.15 0 9.88 0 11.71s.43 3.56 1.19 5.11l3.99-3.1z"/>
                            <path fill="#34A853" d="M12 24c3.24 0 5.97-1.09 7.96-2.94l-3.86-3c-1.1.74-2.51 1.17-4.1 1.17-3.09 0-5.82-2.14-6.82-5.06l-3.99 3.1C3.25 21.33 7.31 24 12 24z"/>
                        </svg>
                        <span>Masuk dengan Google</span>
                    </div>
                    <div class="bg-slate-50 group-hover:bg-slate-900 group-hover:text-white p-2 rounded-full transition-colors">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </div>
                </button>
                <p class="text-center text-[11px] text-slate-400 font-semibold uppercase tracking-widest">Aman & Terenkripsi</p>
            </div>
        </div>

        <!-- Feedback Section -->
        <div id="feedback-section" class="hidden">
            <div class="px-10 pt-10 flex justify-between items-center">
                <div class="flex items-center gap-3 bg-white/60 p-1.5 pr-5 rounded-full border border-white/50 backdrop-blur shadow-sm">
                    <img id="user-avatar" class="w-9 h-9 rounded-full bg-slate-200 border-2 border-white shadow-sm" src="https://ui-avatars.com/api/?name=User" />
                    <div>
                        <p class="text-[9px] text-slate-400 font-bold uppercase leading-none">Login sebagai</p>
                        <p id="user-name" class="text-[11px] font-extrabold text-slate-900 truncate max-w-[120px]">Username</p>
                    </div>
                </div>
                <button onclick="window.logout()" class="w-10 h-10 flex items-center justify-center rounded-full bg-red-50 text-red-500 hover:bg-red-500 hover:text-white transition-all duration-300 shadow-sm">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </button>
            </div>

            <div class="px-10 pt-8 pb-4">
                <h2 class="text-3xl font-black text-slate-900 tracking-tight leading-tight">Bagaimana pengalaman Anda?</h2>
            </div>

            <div id="modal-content" class="px-10 pb-12">
                <div id="step-1" class="space-y-10">
                    <!-- Star Rating -->
                    <div class="space-y-4">
                        <div class="flex justify-center gap-2" id="star-container">
                            <!-- Bintang dihasilkan via JS -->
                        </div>
                        <div id="rating-label" class="text-center text-[11px] font-black uppercase tracking-[0.25em] text-slate-300">Berikan Penilaian</div>
                    </div>

                    <!-- Category -->
                    <div class="space-y-3">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest text-center">Pilih Kategori</p>
                        <div class="flex flex-wrap justify-center gap-3">
                            <button onclick="window.setCategory(this)" class="category-chip px-6 py-3 rounded-2xl border border-slate-200 text-[10px] font-black text-slate-500">BUG</button>
                            <button onclick="window.setCategory(this)" class="category-chip px-6 py-3 rounded-2xl border border-slate-200 text-[10px] font-black text-slate-500">SARAN</button>
                            <button onclick="window.setCategory(this)" class="category-chip px-6 py-3 rounded-2xl border border-slate-200 text-[10px] font-black text-slate-500">LAINNYA</button>
                        </div>
                    </div>

                    <div class="relative group">
                        <textarea id="feedback-text" rows="4" maxlength="300" 
                            class="w-full bg-white/50 border-2 border-slate-100 rounded-[2rem] p-6 text-sm outline-none focus:border-slate-900 focus:bg-white transition-all resize-none shadow-sm input-focus-effect" 
                            placeholder="Ceritakan lebih detail..."></textarea>
                        <div class="absolute bottom-4 right-6 text-[10px] font-bold text-slate-300">
                            <span id="char-count">0</span>/300
                        </div>
                    </div>

                    <button id="submit-btn" onclick="window.submitFeedback()" disabled 
                        class="w-full bg-slate-900 text-white font-black py-6 rounded-[2.5rem] shadow-2xl shadow-slate-200 text-[11px] uppercase tracking-[0.2em] disabled:opacity-20 transition-all active:scale-[0.98] hover:bg-black">
                        Kirim Sekarang
                    </button>
                </div>

                <!-- Success State -->
                <div id="step-2" class="hidden text-center py-10 space-y-8 animate-slide-up">
                    <div class="relative w-28 h-28 mx-auto">
                        <div class="absolute inset-0 bg-emerald-100 rounded-[2.5rem] rotate-12"></div>
                        <div class="absolute inset-0 bg-emerald-500 rounded-[2.5rem] flex items-center justify-center text-white shadow-xl transform transition-transform hover:scale-105">
                            <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
                        </div>
                    </div>
                    <div class="space-y-3">
                        <h3 class="text-3xl font-black text-slate-900">Mantap! 🚀</h3>
                        <p class="text-slate-500 text-sm font-medium px-6">Masukan Anda sudah mendarat di tim kami. Terima kasih atas waktunya!</p>
                    </div>
                    <button onclick="window.resetForm()" class="px-10 py-4 rounded-[2rem] bg-slate-900 text-white text-[10px] font-black uppercase tracking-widest shadow-lg active:scale-95">Kirim Lagi</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqzcvKcqAmRmHqUS6fumlyGgxPO8O2c3Y",
            authDomain: "zea-team.firebaseapp.com",
            projectId: "zea-team",
            storageBucket: "zea-team.firebasestorage.app",
            messagingSenderId: "122346941502",
            appId: "1:122346941502:web:9986957727b3086dd2756f",
            measurementId: "G-Q7P6GNXED7"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.loginGoogle = async () => {
            const btn = document.getElementById('google-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<div class="spinner mx-auto border-t-slate-900 border-slate-200"></div>';
            btn.disabled = true;
            
            try {
                await signInWithPopup(auth, provider);
            } catch (error) {
                console.error("Firebase Auth Error:", error);
                if (error.code === 'auth/unauthorized-domain') {
                    alert("Akses Ditolak: Domain ini belum didaftarkan di Firebase Console.");
                } else {
                    alert("Ops! Ada kesalahan: " + error.message);
                }
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
            }
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            const authSec = document.getElementById('auth-section');
            const feedSec = document.getElementById('feedback-section');
            if (user) {
                authSec.classList.add('hidden');
                feedSec.classList.remove('hidden');
                document.getElementById('user-name').innerText = user.displayName || user.email.split('@')[0];
                document.getElementById('user-avatar').src = user.photoURL || `https://ui-avatars.com/api/?name=${user.email}&background=random`;
                window.currentUser = user;
            } else {
                authSec.classList.remove('hidden');
                feedSec.classList.add('hidden');
                window.currentUser = null;
            }
        });
    </script>

    <script>
        const DISCORD_WEBHOOK_URL = 'https://discord.com/api/webhooks/1487071889892311112/z4IuG7uHgD_FDDV6vIcv8Vsf6807ySoJrIALS7UEYYKY7hmve--jAoaFwSBhF3s8npGQ';
        const DISCORD_USER_ID = '1342761437256486994';

        let currentRating = 0;
        let currentCategory = 'Umum';

        // Star System
        const container = document.getElementById('star-container');
        if (container) {
            for(let i=1; i<=5; i++) {
                container.innerHTML += `
                    <button onclick="window.setRating(${i})" class="star-btn p-1">
                        <svg class="w-12 h-12 fill-current" viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                    </button>
                `;
            }
        }

        const ratingLabels = {
            1: { label: "Buruk Sekali", color: "text-red-500" },
            2: { label: "Kurang Puas", color: "text-orange-500" },
            3: { label: "Cukup Baik", color: "text-amber-500" },
            4: { label: "Sangat Puas", color: "text-emerald-500" },
            5: { label: "Sempurna!", color: "text-indigo-600" }
        };

        window.setRating = (val) => {
            currentRating = val;
            document.querySelectorAll('.star-btn').forEach((s, i) => s.classList.toggle('active', i < val));
            const label = document.getElementById('rating-label');
            if (label && ratingLabels[val]) {
                label.innerText = ratingLabels[val].label;
                label.className = `text-center text-[11px] font-black uppercase tracking-[0.25em] ${ratingLabels[val].color} animate-bounce`;
                setTimeout(() => label.classList.remove('animate-bounce'), 500);
            }
            document.getElementById('submit-btn').disabled = false;
        };

        window.setCategory = (el) => {
            document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            currentCategory = el.innerText;
        };

        // Character Counter
        document.getElementById('feedback-text').addEventListener('input', function(e) {
            document.getElementById('char-count').innerText = e.target.value.length;
        });

        window.resetForm = () => {
            currentRating = 0;
            document.getElementById('step-1').classList.remove('hidden');
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('feedback-text').value = '';
            document.getElementById('char-count').innerText = '0';
            document.querySelectorAll('.star-btn').forEach(s => s.classList.remove('active'));
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('rating-label').innerText = "Berikan Penilaian";
            document.getElementById('rating-label').className = "text-center text-[11px] font-black uppercase tracking-[0.25em] text-slate-300";
        };

        window.submitFeedback = async () => {
            const user = window.currentUser;
            if(!user) return alert("Silakan login dulu");

            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerText;
            btn.innerHTML = '<div class="spinner mx-auto"></div>';
            btn.disabled = true;
            
            const payload = {
                content: `🚀 **FEEDBACK BARU** untuk <@${DISCORD_USER_ID}>`,
                embeds: [{
                    title: "✨ Premium Submission",
                    color: 0x0f172a,
                    fields: [
                        { name: "👤 Pengguna", value: `**${user.displayName}**\n\`${user.email}\``, inline: true },
                        { name: "⭐ Skor", value: "⭐".repeat(currentRating), inline: true },
                        { name: "🏷️ Kategori", value: `\`${currentCategory}\``, inline: true },
                        { name: "📝 Detail Pesan", value: `\`\`\`${document.getElementById('feedback-text').value || "Tanpa pesan"}\`\`\`` }
                    ],
                    thumbnail: { url: user.photoURL || "" },
                    footer: { text: `User ID: ${user.uid} • Dikirim via Premium UI` },
                    timestamp: new Date().toISOString()
                }]
            };

            try {
                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                if (response.ok) {
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-2').classList.remove('hidden');
                } else {
                    throw new Error("Discord API error");
                }
            } catch (e) {
                console.error(e);
                alert("Gagal kirim. Pastikan internet stabil.");
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
